<script>
'use strict';
// https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/Intl/DateTimeFormat/DateTimeFormat

var list = gLocales,
	aLegend = [],
	aLocales = [],
	isSupported = false,
	localesHashAll = "", // to compare min to
	oData = {}

function log_console(name) {
	let hash = mini(sDetail[name])
	if (name == "locales") {
		console.log(name +": " + hash +"\n"+ sDetail["locales"].join("\n"))
	} else {
		console.log(name +": " + hash +"\n", sDetail[name])
	}
}

function legend() {
	// build once
	if (aLegend.length == 0) {
		list.sort()
		for (let i = 0 ; i < list.length; i++) {
			let str = list[i].toLowerCase()
			let code = str.split(",")[0].trim()
			let name = (undefined !== str.split(",")[1]) ? str.split(",")[1].trim() : ''
			let go = true
			if (isSupported) {
				go = Intl.DateTimeFormat.supportedLocalesOf([code]).length > 0
			}
			if (go) {
				aLocales.push(code)
				let isSplit = (name.includes("(") && (name.length + code.length) > 32)
				if (name.includes("(")) {
					let name0 = name.split("(")[0].trim()
					let name1 = name.substring(
						name.indexOf("(") + 1, 
						name.lastIndexOf(")")
					)
					name1 = s99 +"("+ name1 + ")"+ sc
					if (isSplit) {
						name = name0 +"<br>"+ " ".repeat(4) + name1
					} else {
						name = name0 +" "+ name1
					}
				}
				aLegend.push(code.padStart(7) +": "+ name)
			}
		}
	}
	// output
	let header = s4 +"LEGEND ["+ aLegend.length +"]"+ sc +"<br><br>"
	dom.legend.innerHTML = header + aLegend.join("<br>")
}

function run_main(method = "all") {
	let t0 = performance.now()
	let spacer = "<br><br>"

	// all dates (days/months/am-pm) must be timezone resistent:  we are checking locale only
		// timezonename (and locale) is tested in the a different PoC - see TZP set_oIntlDateTests section
	// thus we use UTC time so everyone uses the exact same dates, and then we pass
		// UTC as the timezone so nothing shifts, preserving our specific datetimes
	// note: only some sub-tests actually expose the day and/or hr

	let dates = {
		// fractionalSecondDigits: we only ever reveal the seconds
		FSD: new Date('2023-06-10T01:12:34.567Z'),
		// month (x4) + year (xJan): we only ever reveal the month or year
		Jan: new Date('2023-01-15T00:00:00.000Z'),
		Feb: new Date('2023-02-15T00:00:00.000Z'),
		Mar: new Date('2023-03-15T00:00:00.000Z'),
		Apr: new Date('2023-04-15T00:00:00.000Z'),
		May: new Date('2023-05-15T00:00:00.000Z'),
		Jun: new Date('2023-06-15T00:00:00.000Z'),
		Jul: new Date('2023-07-15T00:00:00.000Z'),
		Aug: new Date('2023-08-15T00:00:00.000Z'),
		Sep: new Date('2023-09-15T00:00:00.000Z'),
		Oct: new Date('2023-10-15T00:00:00.000Z'),
		Nov: new Date('2023-11-15T00:00:00.000Z'),
		Dec: new Date('2023-12-15T00:00:00.000Z'),
		// days (x2) + hrs (xFri) expose doh! days + hrs
		Day: new Date("2003-01-01T01:00:00.000Z"), // single digit day
		Sat: new Date('2023-01-14T01:00:00.000Z'),
		Sun: new Date('2023-01-15T01:00:00.000Z'),
		Mon: new Date('2023-01-16T01:00:00.000Z'),
		Tue: new Date('2023-01-17T01:00:00.000Z'),
		Wed: new Date('2023-01-18T01:00:00.000Z'), // doubles as hour 1 + minute 0
		Thu: new Date('2023-01-19T01:00:00.000Z'),
		Fri: new Date('2023-01-20T13:00:00.000Z'), // doubles as hour 13
		// era: expose day
		Era1: new Date('-000002-01-15T01:00:00.000Z'), // BC
		Era2: new Date('2001-01-01T01:00:00.000Z'), // AD
	}


	// https://www.w3schools.com/jsref/jsref_tolocalestring.asp
	let testsAll = {
		"day": {
			dates: [dates.Day],
			options: {
				"2-digit": {day: "2-digit"},
				"numeric": {day: "numeric"},
			},
		},
		"era": {
			dates: [dates.Era1, dates.Era2],
			options: {
				"long": {era: "long"},
				"narrow": {era: "narrow"},
				"short": {era: "short"},
			},
		},
		// this adds nothing on it's own: what adds entropy is the delimiters and decimal separator
		"fractionalSecondDigits": {
			dates: [dates.FSD],
			options: {
				"1": {minute: "numeric", second: 'numeric', fractionalSecondDigits: 1},
				"2": {minute: "numeric", second: 'numeric', fractionalSecondDigits: 2},
				"3": {minute: "numeric", second: 'numeric', fractionalSecondDigits: 3},
			},
		},
		"hour": {
			dates: [dates.Wed, dates.Fri],
			options: {
				"2-digit": {hour: "2-digit"},
				"numeric": {hour: "numeric"},
			},
		},
		"hourCycle": {
			dates: [dates.Wed],
			options: {
				"h112": {hour: "2-digit", hourCycle: "h11"},
				// these add nothing except perf cost!
				//"h11-n": {hour: "numeric", hourCycle: "h11"},
				//"h12-2": {hour: "2-digit", hourCycle: "h12"},
				//"h12-n": {hour: "numeric", hourCycle: "h12"},
				//"h23-2": {hour: "2-digit", hourCycle: "h23"},
				//"h23-n": {hour: "numeric", hourCycle: "h23"},
				//"h24-2": {hour: "2-digit", hourCycle: "h24"},
				//"h24-n": {hour: "numeric", hourCycle: "h24"},
				},
		},
		"minute": {
			dates: [dates.Wed], // single digit 0 vs 00
			options: {
				"2-digit": {minute: "2-digit"},
				"numeric": {minute: "numeric"},
			},
		},
		"month": {
			dates: [
				dates.Jan, dates.Feb, dates.Mar, dates.Apr, dates.May, dates.Jun,
				dates.Jul, dates.Aug, dates.Sep, dates.Oct, dates.Nov, dates.Dec,
			],
			options: {
				"2-digit": {month: "2-digit"},
				"long": {month: "long"},
				"narrow": {month: "narrow"},
				"numeric": {month: "numeric"},
				"short": {month: "short"},
			},
		},
		"second": {
			dates: [dates.FSD],
			options: {
				"2-digit": {second: "2-digit"},
				"numeric": {second: "numeric"},
			},
		},
		"weekday": {
			dates: [dates.Mon, dates.Tue, dates.Wed, dates.Thu, dates.Fri, dates.Sat, dates.Sun],
			options: {
				"long": {weekday: "long"},
				"narrow": {weekday: "narrow"},
				"short": {weekday: "short"},
			},
		},
		"year": {
			dates: [dates.Jan],
			options: {
				"2-digit": {year: "2-digit"},
				"numeric": {year: "numeric"},
			},
		},
	}
	let testsMin = {
		"era": [
			// to match TZP we will add controlling the year-month-day part (in TZP this is needed to get toLocaleString to match)
			[dates.Era1, {"long": {era: "long", year: "numeric", month: "numeric", day: "numeric"}}],
		],
		"fractionalSecondDigits": [
			[dates.FSD, {"1": {minute: "numeric", second: 'numeric', fractionalSecondDigits: 1}}]
		],
		"hour": [
			[dates.Wed, {"numeric": {hour: "numeric"}}],
		],
		"hourCycle": [
			[dates.Wed, {"h112": {hour: "2-digit", hourCycle: "h11"}}], // adds like 2 items
		],
		"month": [
			[dates.Nov, {"narrow": {month: "narrow"}}],
			[dates.Jan, {"short": {month: "short"}}],
			[dates.Jun, {"short": {month: "short"}}], // needed for FF146 and lower
			[dates.Sep, {"short": {month: "short"}}],
			[dates.Nov, {"short": {month: "short"}}],
		],
		"weekday": [
			[dates.Wed, {"narrow": {weekday: "narrow"}, "long": {weekday: "long"}}],
			[dates.Fri, {"short": {weekday: "short"}, "narrow": {weekday: "narrow"}, "long": {weekday: "long"}}],
		],
		"year": [ // needed for blink
			[dates.Jan, {"2-digit": {year: "2-digit"}}],
		],
	}
	let tests = method == "all" ? testsAll : testsMin
	//console.log(tests)

	let oConst = {}
	oData = {}

	//aLocales = ['en']
	try {
		aLocales.forEach(function(code) {
			let oTempData = {}
			Object.keys(tests).sort().forEach(function(test) {
				oTempData[test] = {}
				if (method == "all") {
					Object.keys(tests[test].options).forEach(function(opt) {
						oTempData[test][opt] = []
						let options = tests[test].options[opt]
						options['timeZone'] = "UTC"
						let formatter = new Intl.DateTimeFormat(code, options)
						let dates = tests[test].dates
						dates.forEach(function(date){
							oTempData[test][opt].push(formatter.format(date))
						})
					})
				} else {
					try {oConst.WeS = new Intl.DateTimeFormat(code, {weekday: "short", timeZone: "UTC"})} catch(e) {}
					try {oConst.WeN = new Intl.DateTimeFormat(code, {weekday: "narrow", timeZone: "UTC"})} catch(e) {}
					try {oConst.WeL = new Intl.DateTimeFormat(code, {weekday: "long", timeZone: "UTC"})} catch(e) {}
					try {oConst.MoS = new Intl.DateTimeFormat(code, {month: "short", timeZone: "UTC"})} catch(e) {}
					try {oConst.MoN = new Intl.DateTimeFormat(code, {month: "narrow", timeZone: "UTC"})} catch(e) {}
					try {oConst.HoN = new Intl.DateTimeFormat(code, {hour: "numeric", timeZone: "UTC"})} catch(e) {}
					try {oConst.HoH = new Intl.DateTimeFormat(code, {hour: "2-digit", hourCycle: "h11", timeZone: "UTC"})} catch(e) {}
					try {oConst.ErL = new Intl.DateTimeFormat(code, {era: "long", timeZone: "UTC"})} catch(e) {}
					try {oConst.Fr1 = new Intl.DateTimeFormat(code, {minute: "numeric", second: 'numeric', timeZone: "UTC", fractionalSecondDigits: 1})} catch(e) {}
					try {oConst.Fr2 = new Intl.DateTimeFormat(code, {minute: "numeric", second: 'numeric', timeZone: "UTC", fractionalSecondDigits: 2})} catch(e) {}
					try {oConst.Fr3 = new Intl.DateTimeFormat(code, {minute: "numeric", second: 'numeric', timeZone: "UTC", fractionalSecondDigits: 3})} catch(e) {}
					try {oConst.Ye2 = new Intl.DateTimeFormat(code, {year: "2-digit", timeZone: "UTC"})} catch(e) {}

					/* only maybe used if trying to test other values outside of current min
					try {oConst.ErN = new Intl.DateTimeFormat(code, {era: "narrow", timeZone: "UTC"})} catch(e) {}
					try {oConst.ErS = new Intl.DateTimeFormat(code, {era: "short", timeZone: "UTC"})} catch(e) {}
					try {oConst.MoL = new Intl.DateTimeFormat(code, {month: "long", timeZone: "UTC"})} catch(e) {}
					try {oConst.Se2 = new Intl.DateTimeFormat(code, {second: "2-digit", timeZone: "UTC"})} catch(e) {}
					try {oConst.SeN = new Intl.DateTimeFormat(code, {second: "numeric", timeZone: "UTC"})} catch(e) {}
					try {oConst.YeN = new Intl.DateTimeFormat(code, {year: "numeric", timeZone: "UTC"})} catch(e) {}
					//*/

					let array = tests[test]
					array.forEach(function(item) {
						let date = item[0]
						let styles = item[1]
						Object.keys(styles).forEach(function(opt) {
							if (oTempData[test][opt] == undefined) {
								oTempData[test][opt] = []
							}
							let constructor = test.slice(0,1).toUpperCase() + test.slice(1,2) + opt.slice(0,1).toUpperCase()
							//console.log(test.slice(0,1).toUpperCase() + test.slice(1,2) + opt.slice(0,1).toUpperCase())
							let formatter = oConst[constructor]
							oTempData[test][opt].push(formatter.format(date))
						})
					})
				}
			})
			//console.log(oTempData)

			let hash = mini(oTempData)
			if (oData[hash] == undefined) {
				oData[hash] = {}
				oData[hash]["locales"] = [code]
				oData[hash]["data"] = {}
				for (const k of Object.keys(oTempData).sort()) {
					oData[hash]["data"][k] = oTempData[k]
				}
			} else {
				oData[hash]["locales"].push(code)
			}
		})
		// perf
		dom.perf.innerHTML = Math.round(performance.now() - t0) +" ms"
		//console.log(oData)

		let localeGroups = [], displaylist = []
		for (const k of Object.keys(oData)) {
			localeGroups.push(oData[k]["locales"])
			let localeCount = oData[k]["locales"].length
			let str = ""
			for (const p of Object.keys(oData[k]["data"])) {
				str += s14 + p +": "+ sc
				for (const i of Object.keys(oData[k]["data"][p]).sort()) {
					let option
					let slicelen = (p == "hourCycle" ? 5 : 1)
					if (i == "numeric") {
						option = "Num"
					} else {
						option = i.slice(0,slicelen).toUpperCase()
					}
					str += "<li>"+ s16 + option +": "+ sc + oData[k]["data"][p][i].join(", ") +"</li>"
				}
			}
			displaylist.push(
				s12 + k + sc + s4 + " ["+ localeCount +"]"+ sc
				+ "<ul class='main'>"+ str
				+ "<li>"+ s12 +"L: "+ sc + oData[k]["locales"].join(", ") +"</li></ul>"
			)
		}

		// hashes + btns
		sDetail["results"] = oData
		let resultsBtn = "<span class='btn4 btnc' onClick='log_console(`results`)'>[details]</span>"
		let resultsHash = mini(oData)
		localeGroups.sort()
		sDetail["locales"] = localeGroups
		let localesBtn = "<span class='btn4 btnc' onClick='log_console(`locales`)'>[details]</span>"
		let localesHash = mini(localeGroups)

		/*
		console.log(localesHash)
		console.log(localeGroups)
		console.log(resultsHash)
		console.log(oData)
		//*/

		// notations
		let localesMatch = ""
		if (method == "all") {
			localesHashAll = localesHash
			// notate new if 140+
			if (isVer > 139) {
				// ignore if non-supported used, which return same as undefined = user's resolved options
				// results
				if (resultsHash == "77e258bf") { // FF151+
				} else if (resultsHash == "6e33774c") { // FF147-150
				} else if (resultsHash == "e0558272") { // FF140-146+
				} else {resultsHash += ' '+ zNEW
				}
				// locales
				if (localesHash == "b4751570") { // FF147+: 325
				} else if (localesHash == "32f59b41") { // FF140-146: 326
				} else {localesHash += ' '+ zNEW
				}
			}
		} else if (method == "min") {
			localesMatch = localesHash == localesHashAll ? green_tick : red_cross
		}

		// display
		let display = s4 + localeGroups.length + sc +" from "+ s4 + aLocales.length + sc
			+ spacer + s16 +"results: "+ sc + resultsHash +" " + resultsBtn +"<br>"
			+ s12 +"locales: "+ sc + localesHash +" "+ localesBtn + localesMatch + spacer
		dom.results.innerHTML = display + "<br>" + displaylist.join("<br>")

	} catch(e) {
		dom.results.innerHTML = s4 + e.name +": "+ sc + e.message
	}
}

function run(method) {
	if (isSupported) {
		//reset
		setBtn(method)
		dom.perf = ""
		dom.results = ""
		// delay so users see change and allow paint
		setTimeout(function() {
			run_main(method)
		}, 1)
	}
}

function setBtn(method) {
	// reset btns
	let items = document.getElementsByClassName("btn8")
	for (let i=0; i < items.length; i++) {
		items[i].classList.add("btn4")
		items[i].classList.remove("btn8")
	}
	// set btn
	let el = document.getElementById("b"+ method)
	el.classList.add("btn8")
	el.classList.remove("btn4")
}
