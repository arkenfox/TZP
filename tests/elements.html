<!DOCTYPE html>
<html>
<head>
	<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
	<meta name="viewport" content="width=500">
	<title>elements</title>
  <link rel="stylesheet" type="text/css" href="testindex.css"> <!-- -->
  <script src="testglobals.js"></script>
  <script src="testgeneric.js"></script>
	<style>
		table {width: 97%; min-width: 780px; max-width: 780px}

		/* make sure we specify #element-fp so the previous #element-fp ones are ovewritten */
		/* https://developer.mozilla.org/en-US/docs/Web/CSS/all */
		#element-fp .revert {
			all: revert;
		}
		/*** custom styles so we can check they are removed ***/
		/* this covers everything so far: they all change
			but caption and legend are off to begin with .. again
		*/
		#element-fp a,
		#element-fp b,
		#element-fp code,
		#element-fp div,
		#element-fp hr,
		#element-fp i,
		#element-fp span,
		audio, abbr, acronym, address, applet, article, aside,
		base, basefont,
		center, cite, data, del, dfn, em, footer,
		strike, strong, u {
			margin: 2px; padding: 2px;
		}
		#element-fp div>span {font-size: 2.9em;}
		#element-fp font[size="1"] {font-size: 1.1em;}
		#element-fp font[size="2"] {font-size: 1.2em;}
		#element-fp font[size="3"] {font-size: 1.3em;}
		#element-fp font[size="4"] {font-size: 1.4em;}
		#element-fp font[size="5"] {font-size: 1.5em;}
		#element-fp font[size="6"] {font-size: 1.6em;}
		#element-fp font[size="7"] {font-size: 1.7em;}

		#element-fp br, #element-fp small, #element-fp sub,
		#element-fp sup, #element-fp h1, #element-fp h2, #element-fp h3,
		#element-fp h4, #element-fp h5, #element-fp h6, big, blockquote,
		caption, dd, dialog, dl, dt, figcaption, fieldset, legend {
 			margin: 2px;
			padding: 2px;
		}
		canvas, iframe {width: 75px;}

	</style>
</head>

<body>
	<div id="element-fp"></div>

	<table>
	<tr><td><h2>TorZillaPrint</h2></td></tr>
	<tr><td class="blurb"><a class="return" href="../index.html#elements">return to TZP index</a></td></tr>
	</table>

	<table id="tb15">
		<col width="25%"><col width="75%">
		<thead><tr><th colspan="2">
			<div class="nav-title">elements
				<div class="nav-up"><span class="c perf" id="perf"></span></div>
				<div class="nav-down"><span class="perf" id="locale"></span></div>
			</div>
		</th></tr></thead>
		<tr><td colspan="2" class="intro">
			<span class="no_color">Element sizes not covered in
				<a class="blue" target="_blank" href="elementforms.html">elememt forms</a></span><br><br>
			<span class="btn15 btnfirst" onClick="run(`everything`)">[ everything ]</span>
			<span class="btn15 btnfirst" onClick="run(`TZP`)">[ TZP ]</span>

		</td></tr>
		<tr><td colspan="2"><hr><br></td></tr>
		<tr><td colspan="2" style="text-align: left;">
			<div class="c mono spaces no_color" id="elements"></div>
		</td></tr>
	</table>
	<br>

<script>
'use strict';
/*
	// ignore
	// https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base
	form: all forms covered in another metric
	area: used in map and sets it's own size
	bdi/bdo: bidirectional elements

	// the rest
	col colgroup
	datalist dir
	element-details em
	frame frameset
	head header hgroup
	ins isindex
	kbd keygen
	li link
	main map mark marquee menu menuitem
	nav nextid nobr noframes noscript
	object ol optgroup option output
	param plaintext portal pre
	q
	rb rbc rp rt rtc ruby
	s samp script search section slot source style
	table tbody td template tfoot th thead time title tr track tt
	ul
	var
	wbr xmp
*/

let isLocale = ""
let isRevert = true
let isNotateStyle = false
let oData = {}
let oList = {}

// note: some elements we insert a char "." to force a height
	// always use the same char
let oListBase = {
	a: '<a href="">.</a>',
	audio: '<audio controls=""></audio>',
	base: '<base href=""/>', // empty: width/x are zero but height/y are interesting
	big_x2: '<big><big>.</big></big>',
	big_x3: '<big><big><big>.</big></big></big>',
	br: '<br>',
	canvas: '<canvas></canvas>',
	// always revert tables because we have that in our inline style in the plain test
	caption: '<table class="revert"><caption>.</caption></table>',
	dd: '<dl><dd>.</dd></dl>',
	dialog: '<dialog open=""></dialog>',
	dt: '<dl><dt>.</dt></dl>',
	fieldset: '<fieldset></fieldset>', // don't include char
	figcaption: '<figure><figcaption>.</figcaption></figure>',
	figure: '<figure></figure>',
	hr: '<hr>',
	img: '<img></img>', // adds to unique results when horizontal else same as base
	legend: '<fieldset><legend>.</legend></fieldset>',
	// redundant
	basefont: '<basefont color="#FF0000"/>',
	noembed: '<embed><noembed>.</noembed>',
	label: '<div id="elementlabel"><label for="elementlabel">.</label></div<',
	summary: '<details><summary>.</summary></details>',
	picture: '<picture></picture>',
	video: '<video></video>',

}
let aListBaseAdd = [
	'big','blockquote','code','dl',
	'h1','h2','h3','h4','h5','h6',
	'iframe','meter','small','sub','sup',
	// redundant
	'abbr','acronym','address','applet','article','aside',
	'b','center','cite',
	'data','del','div','dfn','em','footer','i',
	'p','span','strike','strong',
	'u',
]
aListBaseAdd.forEach(function(item){oListBase[item] = '<'+item+'>.</'+item+'>'})


// TZP
// we can't get more unique elements than actual elements used
// so don't double up: e.g. in blink android we have 35 unique elements in
// everything but only 34 elements used in tzp (at the time): so we need to
// add a new element: the point of difference was in "base, basefont, picture"
// (grouped in everything) - we already use base, so instead add basefont or picture 

let oTZP = {
	'horizontal-tb' : {
		base: '<base href=""/>',
		figure: '<figure></figure>',
		// for android blink
		picture: '<picture></picture>',
			// ^ redundant with base above, but gives us the max unique elements
	},
	'vertical-lr' : {
		// desktop
		a: '<a href="">.</a>',
		audio: '<audio controls=""></audio>',
		base: '<base href=""/>',
		big_x2: '<big><big>.</big></big>',
		big_x3: '<big><big><big>.</big></big></big>',
		br: '<br>',
		canvas: '<canvas></canvas>',
		// always revert tables because we have that in our inline style in the plain test
		caption: '<table class="revert"><caption>.</caption></table>',
		dd: '<dl><dd>.</dd></dl>',
		dialog: '<dialog open=""></dialog>',
		dt: '<dl><dt>.</dt></dl>',
		fieldset: '<fieldset></fieldset>', // don't include char
		figcaption: '<figure><figcaption>.</figcaption></figure>',
		hr: '<hr>',
		legend: '<fieldset><legend>.</legend></fieldset>',

		// for android blink
		noembed: '<embed><noembed>.</noembed>',
	}
}
let aVerticalAdd = [
	// desktop
	'big','blockquote','code','dl','h1','h2','h3','h4','h5','h6',
	'iframe','meter','small','sub','sup',
	// for android
	'i','b',
]
aVerticalAdd.forEach(function(item){oTZP['vertical-lr'][item] = '<'+item+'>.</'+item+'>'})


let testTarget
function create_element(str, style ='vertical-lr') {
	// create an element so I can inspect it
	const parent = dom['element-fp']
	parent.innerHTML = str
	let target = parent.firstChild
	if (isRevert) {target.classList.add('revert')}
	let newtarget = target.children[0]
	if (undefined !== newtarget) {
		target = newtarget
		if (isRevert) {target.classList.add('revert')}
		newtarget = target.children[0]
		if (undefined !== newtarget) {
			target = newtarget
			if (isRevert) {target.classList.add('revert')}
		}
	}
	target.setAttribute("style","display:inline; writing-mode: "+ style +";")
	let method = target.getBoundingClientRect()
	let itemdata = [method.width, method.height, method.x, method.y]

	testTarget = target
	console.log('testTarget', style, '\n', testTarget)
	console.log(method)
	console.log(itemdata)
}


function get_elements(type) {
	if (undefined == type) {type = isFF ? 'TZP' : 'everything'}
	let t0 = performance.now()
	oData = {}
	let params = [s15 + type + sc]
	oList = {}
	if ('TZP' == type) {
		oList = oTZP
	} else {
		oList = {everything: oListBase}
	}

	let tmpdata = {}, newobj = {}
	const parent = dom['element-fp']
	try {
		let target
		let testCount = 0
		if ('everything' == type) {
			// we list items with no writing mode
			// but apply both and hash together to calculate unique elements
			for (const t of Object.keys(oList)) {
				for (const k of Object.keys(oList[t])) {
					testCount++
					let aStyle = ['horizontal-tb','vertical-lr']
					let elementdata = {}

					// set parent, determine target to measure and as we walk
					// the children, ensure no other css affects any element
					parent.innerHTML = ''
					parent.innerHTML = oList[t][k]
					target = parent.firstChild
					if (isRevert) {target.classList.add('revert')}
					let newtarget = target.children[0]
					if (undefined !== newtarget) {
						target = newtarget
						if (isRevert) {target.classList.add('revert')}
						newtarget = target.children[0]
						if (undefined !== newtarget) {
							target = newtarget
							if (isRevert) {target.classList.add('revert')}
						}
					}
					for (let i=0; i < aStyle.length; i++) {
						let style = aStyle[i]
						let styleCode = style.slice(0, 1)
						try {
							target.setAttribute("style","display:inline; writing-mode: "+ style +";")
							let method = target.getBoundingClientRect()
							let data = [method.width, method.height, method.x, method.y]
							data = isNotateStyle ? [styleCode].concat(data) : data
							// always use x as this helps ensure entropy regardless of isVertical
							let dataExtra = isNotateStyle ? [styleCode, method.x] : [method.x]
							style = style.slice(0, -3)
							elementdata[style] = data
						} catch(e) {
							elementdata = 'error'
							console.log(k, e+'')
						}
					}
					let elementhash = mini(elementdata)
					if (undefined == tmpdata[elementhash]) {tmpdata[elementhash] = {'data': elementdata, 'group': [k]}
					} else {tmpdata[elementhash]['group'].push(k)}
				}
			}
			// group by results
			let newobj = {}
			for (const k of Object.keys(tmpdata)) {
				newobj[tmpdata[k].group[0]] = {
					'data': tmpdata[k]['data'],
					'elements': tmpdata[k].group.sort(),
					'hash': k
				}
			}
			//console.log(newobj)
			for (const k of Object.keys(newobj).sort()) {
				let displayhash = newobj[k]['hash']
				oData[displayhash] = {
					'elements': newobj[k]['elements'],
					'data': newobj[k]['data']
				}
			}
			// counts
			params.push(testCount +' elements')
			params.push(testCount * 2 +' measurements')
			params.push(Object.keys(oData).length +' unique elements')
		} else {
			// count unique hashes per element+writingstyle + unique element names
			let setHash = new Set(), setElements = new Set()

			// create a shadow data object to track unique elements
				// note: it would be easy to create misleading uniqueness given
				// 30+ unqiue elements in everything x 2 writing-modes but
				// we can be diligent in spotting points of difference (e.g. see
				// noembed vertical for blink) and it would be nice to match up
				// the numbers across the two tests
			let shadowData = {}


			// tzp style we group by writing style then element hashes
			for (const s of Object.keys(oList).sort()) {
				let style = s.slice(0,-3)
				tmpdata[style] = {}
				for (const k of Object.keys(oList[s]).sort()) {
					// count measurments taken
					testCount++
					// unique elements tested
					setElements.add(k)
					// set parent, determine target to measure and as we walk
					// the children, ensure no other css affects any element
					//parent.innerHTML = ''
					parent.innerHTML = oList[s][k]
					let target = parent.firstChild
					target.classList.add('revert')
					let newtarget = target.children[0]
					if (undefined !== newtarget) {
						target = newtarget
						target.classList.add('revert')
						newtarget = target.children[0]
						if (undefined !== newtarget) {
							target = newtarget
							target.classList.add('revert')
						}
					}
					target.setAttribute('style','display:inline; writing-mode: '+ s +';')
					let method = target.getBoundingClientRect()
					// typecheck
					let itemdata = [method.width, method.height, method.x, method.y]
					let itemhash = mini(itemdata)
					// add shadowData
					if (undefined == shadowData[k]) {shadowData[k] = {}}
					shadowData[k][style] = itemdata
					// unique measurments
					setHash.add(itemhash)
					// record
					if (undefined == tmpdata[style][itemhash]) {tmpdata[style][itemhash] = {'data': itemdata, 'group': [k]}
					} else {tmpdata[style][itemhash]['group'].push(k)}
				}
			}
			// group by results
			for (const s of Object.keys(tmpdata)) {
				newobj[s] = {}
				for (const k of Object.keys(tmpdata[s])) {
					let keydata = tmpdata[s][k].group.sort()
					newobj[s][keydata.join(' ')] = tmpdata[s][k]['data']
				}
			}
			for (const s of Object.keys(newobj)) {
				oData[s] = {}
				for (const k of Object.keys(newobj[s]).sort()) {oData[s][k] = newobj[s][k]}
			}
			// counts
			let aHash = Array.from(setHash), aElements = Array.from(setElements)
			params.push(aElements.length +' elements')
			params.push(testCount +' measurements')
			params.push(aHash.length +' unique measurements')

			// shadowData
			//console.log(shadowData)
			let setShadow = new Set()
			for (const k of Object.keys(shadowData)) {
				let elementhash = mini(shadowData[k])
				setShadow.add(elementhash)
			}
			let aShadow = Array.from(setShadow)
			params.push(aShadow.length +' unique elements')
		}
		//console.log(tmpdata)
		parent.innerHTML = "" // clear display

		let hash = mini(oData), notation = ""
		let t1 = performance.now()
		try {dom.perf.innerHTML = Math.round(t1 - t0) +" ms"} catch(e) {}

		let strParam = (params.length ? " ["+ params.join(" | ") +"]" : "")
		let display = [], tmphash = ""
		dom.elements.innerHTML = hash + strParam +"<br><br>"+ json_highlight(oData, 120)
		return
	} catch(e) {
		parent.innerHTML = "" // clear display
		dom.elements = e+""
		return
	}
}

function run(type) {
	// clear
	dom.elements.innerHTML = " &nbsp; "
	// pause so users see change
	setTimeout(function() {
		get_elements(type)
	}, 170)
}

try {isLocale = Intl.DateTimeFormat().resolvedOptions().locale} catch(e) {isLocale = zErr}
try {dom.locale.innerHTML = isLocale} catch(e) {}

Promise.all([
	get_globals()
]).then(function(){
	run()
})

</script>
</body>
</html>
