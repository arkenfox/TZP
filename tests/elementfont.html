<!DOCTYPE html>
<html>
<head>
	<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
	<meta name="viewport" content="width=500">
	<title>elements: fonts</title>
	<link rel="stylesheet" type="text/css" href="testindex.css">
	<script src="testglobals.js"></script>
	<script src="testgeneric.js"></script>
	<style>
		table {width: 97%; min-width: 480px; max-width: 780px;}
	</style>
</head>

<body>

	<table>
	<tr><td><h2>TorZillaPrint</h2></td></tr>
	<tr><td class="blurb"><a class="return" href="../index.html#elements">return to TZP index</a></td></tr>
	</table>

	<table id="tb15">
		<col width="15%"><col width="85%">
		<thead><tr><th colspan="2">
			<div class="nav-title">elements: fonts
				<div class="nav-up"><span class="c perf" id="perf"></span></div>
				<div class="nav-down"><span class="perf" id="locale"></span></div>
			</div>
		</th></tr></thead>
		<tr><td colspan="2" class="intro">
			<span class="no_color">Basic <code>generic-family</code> and
				<a href="https://developer.mozilla.org/en-US/docs/Web/CSS/Reference/Values/absolute-size" class="blue" target="_blank">
					<code>absolute-size</code></a> font element test</span>
			<br><br>
			<span class="btnfirst btn15" onClick="run(`everything`)">[ everything ]</span>
			<span class="btn btn15" onClick="run(`TZP`)">[ TZP ]</span>
			<span class="btn15 btnfirst" onClick="copyclip('results')">[ COPY ]</a></span>
		</td></tr>
		<tr>
			<td colspan="2" style="text-align: left;">
			<hr><br>
			<span class="no_color c mono spaces" id="results"></span></td>
		</tr>
	</table>
	<br>

<script>
'use strict';
let isLanguage = '', isLocale = '', type = 'TZP'

// styles: https://developer.mozilla.org/en-US/docs/Web/CSS/generic-family
// sizes: https://developer.mozilla.org/en-US/docs/Web/CSS/Reference/Values/absolute-size

let oTests = {
	'everything': {
		'sizes': ['3.9pt','xx-small','x-small','small','medium','large','x-large','xx-large','xxx-large','141.7pt','266.6pt','947.7pt'],
		'styles': [
			'cursive','default','emoji','fangsong','fantasy','math','monospace','sans-serif',
			'serif','system-ui','ui-monospace','ui-rounded','ui-sans-serif','ui-serif',
		]
	},
	'TZP': {
		'sizes': [
			// PT
				// we can exclude the pt sizes as these will be used in script/langauge tests
			// absolute-size values
				// not all of them will change on each zoom step, as long as at least one changes (medium does)
				// that should be fine - zoom manifests in lots of other metrics anyway
			// https://developer.mozilla.org/en-US/docs/Web/CSS/Reference/Values/absolute-size
				// AFAICT they are all relative to medium, so we can get away with a single size IIUIC
				// note: a scripts/language test with pt values can defintiely change groupings so this
				// assumption/test might be biased by my default settings/language/platform/fonts etc
				// but we will do that lang/script test to expoloit anything, so just medium seems fine
			'medium'
		],
		'styles': [
			'cursive',
			//'default', // we already know the default font, e.g. see font_sizes_base -> "-default-font -moz-bullet-font serif"
			// 'emoji', // we not actually testing any emojis so this == default
			'fangsong',
			'fantasy',
			'math',
			'monospace',
			'sans-serif',
			'serif',
			'system-ui',
			// 'ui-monospace','ui-rounded','ui-sans-serif','ui-serif', // not supported yet AFAICT
		]
	}
}

function get_element_font() {

	let t0 = performance.now()
	const id = 'element-fp'
	let hash, data = {}, method
	let params = [s15 + type + sc]
	let aStyles = oTests[type].styles, aSizes = oTests[type].sizes
	params.push(aStyles.length +' generic-families')
	let isOneSize = aSizes.length == 1
	params.push(aSizes.length +' size' + (isOneSize ? ' <span class="string">'+ aSizes[0] +'</span>' :'s'))

	try {
		const doc = document
		const div = doc.createElement('div')
		div.setAttribute('id', id)
		doc.body.appendChild(div)

		let oData = {}, tmpobj = {}
		aStyles.forEach(function(style){
			let tmpsizes = []
			aSizes.forEach(function(size) {
				// create + measure each individually as preceeding elements can affect subsequent ones
				dom[id].innerHTML = "<div style='font-size:"+ size +";' class='"+ style +"'>...</div>"
				let target = dom[id].firstChild
				// method
				method = target.getBoundingClientRect()
				// width+height = max entropy
				if (isOneSize) {
					tmpsizes.push(method.width, method.height, method.x, method.y)
				} else {
					tmpsizes.push([size, method.width, method.height, method.x, method.y])
				}
			})
			let sizehash = mini(tmpsizes)
			if (oData[sizehash] == undefined) {oData[sizehash] = {data: tmpsizes, group: [style]}
			} else {oData[sizehash].group.push(style)}
		})

		// group by styles
		for (const k of Object.keys(oData)){data[oData[k].group.join(' ')] = oData[k].data}
		let count = Object.keys(data).length
		params.push(count +' unique results')

		let strParam = ' ['+ params.join(' | ') +']'
		hash = mini(data)
		dom.results.innerHTML = hash + strParam +'<br><br>'+ json_highlight(data, 105)

	} catch(e) {
		dom.results.innerHTML = e+''
	}
	// remove element
	removeElementFn(id)
	dom.perf.innerHTML = Math.round(performance.now() -t0) +" ms"
}

try {isLocale = Intl.DateTimeFormat().resolvedOptions().locale} catch(e) {isLocale = zErr}
try {isLanguage = navigator.language} catch(e) {isLanguage = zErr}
try {dom.locale.innerHTML = isLanguage +' | '+ isLocale} catch(e) {console.log(e)}

function run(runtype) {
	type = runtype
	dom.results = ''
	dom.perf = ''
	setTimeout(function() {
		get_element_font(type)
	}, 170)
}
get_element_font()

//make it easy to check all zoom values
if (isFile) {
	window.addEventListener('resize', get_element_font)
}

</script>
</body>
</html>
