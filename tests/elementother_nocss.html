<!DOCTYPE html>
<html>
<head>
	<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
	<meta name="viewport" content="width=500">
	<title>elements: other [no css]</title>
  <!--<link rel="stylesheet" type="text/css" href="testindex.css"> <!-- -->
  <script src="testglobals.js"></script>
  <script src="testgeneric.js"></script>
	<style>
		.mono {font-family: monospace, "Courier New"; font-size: 12px;}
		.spaces {white-space: pre-wrap;}
		#tb15 {
			width: 97%;
			min-width: 780px;
			max-width: 780px;
		}
		#element-fp {
			position: fixed;
			top: 0;
			left: 0;
			font-family: none;
			font-size: initial;
			font-style: normal;
			font-variant: normal;
			font-weight: normal;
			line-height: normal;
			text-transform: none;
			text-align: left;
			text-decoration: none;
			text-shadow: none;
			white-space: nowrap;
			transform: skew(1.787542deg,3.263901deg);
		}
		.btn-right {float: right; position: relative; top: 0px; text-align: right;}
	</style>
</head>

<body>
	<div id="element-fp"></div>

	<table>
	<tr><td><h2>TorZillaPrint</h2></td></tr>
	<tr><td class="blurb"><a class="return" href="../index.html#elements">return to TZP index</a></td></tr>
	</table>

	<table id="tb15">
		<col width="25%"><col width="75%">
		<thead><tr><th colspan="2">
			<div class="nav-title">elements: other [no css]</div>
		</th></tr></thead>
		<tr><td colspan="2" class="intro">
			<span>The <a href="elementother.html">elements: other</a> hash should match the one here - to ensure
			that custom styles don't affect the fingerprint.</span><br><br>
			<span class="btn15 btnfirst" style="cursor: pointer;" onClick="run(`everything`)">[ everything ]</span>
			<span class="btn15 btnfirst" style="cursor: pointer;" onClick="copyclip('elements')">[ COPY ]</a></span>
			<div id="methodused" class="btn-right mono"></div>
		</td></tr>
		<tr><td colspan="2"><hr><br></td></tr>
		<tr><td colspan="2" style="text-align: left;">
			<div class="c mono spaces no_color" id="elements"></div>
		</td></tr>
	</table>
	<br>

<script>
'use strict';

let oData = {}, oList = {}, oListBase = {}, oTZP = {}, oChecks = {}, oCheckSummary = {}
let testTarget
let isMethod = 0, strMethod
let oMethods = {
	0: 'element.getBoundingClientRect()',
	1: 'element.getClientRects()[0]',
	2: 'range.getBoundingClientRect() ',
	3: 'range.getClientRects()[0]',
}

let aUseFirstChild = ['hgroup'] // we want to measure the first element, not the last
let oExtraStyles = {
	'marquee': '; width: 20px; height: 20px', // if we don't constrain it, it changes with inner window sizes
}

let eStr = '.'
function build_lists() {
	// note: some elements we insert a char "." to a) force a height
	// or b) for unique measurements without a char to get more precision/decimal places
	// always use the same char
	let oTmp = {
		a: '<a href="">'+ eStr +'</a>',
		audio: '<audio controls=""></audio>',
		big_x2: '<big><big>'+ eStr +'</big></big>',
		big_x3: '<big><big><big>'+ eStr +'</big></big></big>',
		// always revert tables because we have that in our inline style in the plain test
		caption: '<table><caption>'+ eStr +'</caption></table>',
		dd: '<dl><dd>'+ eStr +'</dd></dl>',
		dialog: '<dialog open=""></dialog>',
		dt: '<dl><dt>'+ eStr +'</dt></dl>',
		figcaption: '<figure><figcaption>'+ eStr +'</figcaption></figure>',
		hgroup: '<hgroup><h1>'+ eStr +'</h1><p class="revert">'+ eStr +'</p></hgroup>', // revert 2nd child (p)
		isindex: '<isindex prompt="search"></isindex>',
		keygen: '<form method="POST"><keygen></keygen></form>',
		label: '<div id="elementlabel"><label for="elementlabel">'+ eStr +'</label></div<',
		legend: '<fieldset><legend>'+ eStr +'</legend></fieldset>',
		li: '<ul><li></li></ul>',
		output: '<form><input>=<output class="revert"></output></form>',
			// '<form><input id="a" value="."> = <output id="x" name="x" for="a"></output></form>',
			// we don't actually need to calculate any values
		rb: '<ruby><rb>'+ eStr +'</rb></ruby>',
		rbc: '<ruby><rbc>'+ eStr +'</rbc></ruby>',
		rp: '<ruby><rp style="display:inline;">'+ eStr +'</rp></ruby>',
		rt: '<ruby><rt>'+ eStr +'</rt></ruby>',
		rtc: '<ruby><rtc>'+ eStr +'</rtc></ruby>',
		slot: '<slot style="display:inline;">'+ eStr +'</slot>',
		summary: '<details><summary>'+ eStr +'</summary></details>',
		'q_empty': '<q></q>',
		// tables
		tbody: '<table><tbody></tbody></table>', 
		td: '<table><tr><td></td></tr></table>',
		tfoot: '<table><tfoot></tfoot></table>',
		th: '<table><thead><tr><th></th></tr></thead></table>',
		thead: '<table><thead></thead></table>',
		tr: '<table><tr></tr></table>',
		// other
		'ol_li': '<ol><li>'+ eStr +'</li></ol>',
		'menu_li': '<menu>'+ eStr +'<li></li></menu>',
		'ul_li': '<ul><li>'+ eStr +'</li></ul>',
		// test error
		//'error': '<frame></frame>'
	}
	// programatically add more
	let oExtra = {
		'char': [
			'abbr','acronym','address','applet','article','aside',
			'b','big','blockquote','center','cite','code',
			'data','del','dir','div','dfn','dl','em','footer',
			'h1','h2','h3','h4','h5','h6','header',
			'i','ins','iframe','kbd',
			'main','mark','marquee','menu','meter',
			'nobr','ol','option','p','pre','q',
			'ruby',
			's','samp','section','small','span','strike','strong','sub','sup',
			'time','title','tt',
			'u','ul','var','xmp',
		],
		nochar: [
			'canvas','fieldset','figure',
			'nav','optgroup','picture',
			'portal', // https://wicg.github.io/portals/#the-portal-element
			'search','table','video',
		],
		standalone: [
			'br','hr','img','object','plaintext',
		]
	}
	for (const type of Object.keys(oExtra)) {
		for (const k of Object.keys(oExtra[type])) {
			let array = oExtra[type]
			array.forEach(function(item) {
				if ('standalone' == type) {
					oTmp[item] = '<'+ item +'>'
				} else {
					let str = 'char' == type ? eStr : ''
					oTmp[item] = '<'+ item +'>'+ str +'</'+ item +'>'
				}
			})
		}
	}
	// sort into final object
	for (const k of Object.keys(oTmp).sort()) {
		oListBase[k] = oTmp[k]
	}

	// build TZP
		// we can't get more unique elements than actual elements used
		// so don't double up: e.g. in blink android we have 35 unique elements in
		// everything but only 34 elements used in tzp (at the time): so we need to
		// add a new element: the point of difference was in "base, basefont, picture"
		// (grouped in everything) - we already use base, so instead add basefont or picture 
	oTmp = {
		'horizontal-tb': ['audio','canvas','figure','iframe','img',],
		'vertical-lr': [
			'a','b','big','big_x2','big_x3','blockquote','br',
			'caption','code','dd','dialog','dl','dt','fieldset','figcaption',
			'h1','h2','h3','h4','h5','h6','hgroup','hr','i',
			'legend','li','marquee','menu_li','meter',
			'ol_li','optgroup','option','output','plaintext','pre','q','q_empty',
			'rt','search','small','sub','sup','tfoot','td','ul',
		]
	}
	// populate
	for (const t of Object.keys(oTmp).sort()) {
		oTZP[t] = {}
		let array = oTmp[t].sort()
		array.forEach(function(item) {oTZP[t][item] = oListBase[item]})
	}
	/* testing
	oListBase = {
		tbody: '<table><tbody></tbody></table>', 
		td: '<table><tr><td></td></tr></table>',
		tfoot: '<table><tfoot></tfoot></table>',
		th: '<table><thead><tr><th></th></tr></thead></table>',
		thead: '<table><thead></thead></table>',
		tr: '<table><tr></tr></table>',
	}
	//*/
}

function get_elements(type, isTest = false) {
	if (undefined == type) {type = 'everything'}
	let t0 = performance.now()
	oData = {}
	let params = [s15 + type + sc]
	if (!isTest) {
		oList = 'TZP' == type ? oTZP : {'horizontal-tb': oListBase, 'vertical-lr': oListBase}
	}

	let tmpdata = {}, newobj = {}
	let target, testCount = 0, shadowData = {}
	const parent = dom['element-fp']
	try {
		// count unique hashes per element+writingstyle + unique element names
		let setHash = new Set(), setElements = new Set()

		// create a shadow data object to track unique elements
			// note: it would be easy to create misleading uniqueness given
			// 30+ unqiue elements in everything x 2 writing-modes but
			// we can be diligent in spotting points of difference - it would
			// be nice to match up the numbers across the two tests
		// ^ use shadowData

		for (const s of Object.keys(oList).sort()) {
			//parent.innerHTML = ''
			let style = s.slice(0,-3)
			if ('TZP' == type) {tmpdata[style] = {}}
			for (const k of Object.keys(oList[s]).sort()) {
				let itemdata = {}
				// count measurments taken
				testCount++
				// unique elements tested
				setElements.add(k)
				// set parent, determine target to measure and as we walk
				// the children, ensure no other css affects any element
				//parent.innerHTML = ''
				parent.innerHTML = oList[s][k]
				try {
					target = parent.firstChild
					// revert everything
					for (let i = 0; i < 10; i++) {
						if (isRevert) {target.classList.add('revert')}
						let newtarget = target.children[0]
						if (undefined == newtarget) {break}
						target = newtarget
					}
					// choose target
					if (aUseFirstChild.includes(k)) {target = parent.firstChild}
					// set style
					let extraStyle = undefined == oExtraStyles[k] ? '' : oExtraStyles[k]
					target.setAttribute("style","display:inline; writing-mode: "+ s + extraStyle +";")
					let method
					if (isMethod == 0) {method = target.getBoundingClientRect()
					} else if (isMethod == 1) {method = target.getClientRects()[0]
					} else {
						let range = document.createRange(); range.selectNode(target)
						method = 2 == isMethod ? range.getBoundingClientRect() : range.getClientRects()[0]
					}
					itemdata = [method.width, method.height, method.x, method.y]
				} catch(e) {
					itemdata = zErr
					console.log(k, e+'')
				}

				if ('TZP' == type) {
					let itemhash = mini(itemdata)
					// add shadowData
					if (undefined == shadowData[k]) {shadowData[k] = {}}
					shadowData[k][style] = itemdata
					// unique measurments
					setHash.add(itemhash)
					// record
					if (undefined == tmpdata[style][itemhash]) {tmpdata[style][itemhash] = {'data': itemdata, 'group': [k]}
					} else {tmpdata[style][itemhash]['group'].push(k)}
				} else {
					if (undefined == tmpdata[k]) {tmpdata[k] = {}}
					tmpdata[k][style] = itemdata
				}
			}
		}

		if (isTest) {
			return [tmpdata, target]
		}

		// counts
		let aElements = Array.from(setElements)
		params.push(aElements.length +' elements')
		params.push(testCount +' measurements')

		//console.log(tmpdata)
		let aHash
		if ('TZP' == type) {
			// group by results
			for (const s of Object.keys(tmpdata)) {
				newobj[s] = {}
				for (const k of Object.keys(tmpdata[s])) {
					let keydata = tmpdata[s][k].group.sort()
					newobj[s][keydata.join(' ')] = tmpdata[s][k]['data']
				}
			}
			for (const s of Object.keys(newobj)) {
				oData[s] = {}
				for (const k of Object.keys(newobj[s]).sort()) {oData[s][k] = newobj[s][k]}
			}
			aHash = Array.from(setHash)
			params.push(aHash.length +' unique measurements')
			// shadowData
			//console.log(shadowData)
			let setShadow = new Set()
			for (const k of Object.keys(shadowData)) {
				let elementhash = mini(shadowData[k])
				setShadow.add(elementhash)
			}
			let aShadow = Array.from(setShadow)
			params.push(aShadow.length +' unique elements')
		} else {
			// group by element hash
			for (const k of Object.keys(tmpdata)) {
				let elementhash = mini(tmpdata[k]) +' '
					// the space means the object (sent to json_highlight) doesn't put numeric only chars keys first
					// thus preserving the display in order of first element per hash
				setHash.add(elementhash)
				if (undefined == newobj[elementhash]) {newobj[elementhash] = {'data': tmpdata[k], 'elements': [k]}
				} else {newobj[elementhash]['elements'].push(k)}
			}
			//
			for (const k of Object.keys(newobj)) { // don't sort
				oData[k] = {
					'elements': newobj[k]['elements'].join(', '),
					'data': newobj[k]['data']
				}
			}
			aHash = Array.from(setHash)
			params.push(aHash.length +' unique elements')
		}

		//console.log(tmpdata)
		parent.innerHTML = "" // clear display

		let hash = mini(oData), notation = ""
		let t1 = performance.now()
		try {dom.perf.innerHTML = Math.round(t1 - t0) +" ms"} catch(e) {}

		let strParam = (params.length ? " ["+ params.join(" | ") +"]" : "")
		let display = [], tmphash = ""
		dom.methodused.innerHTML = strMethod
		dom.elements.innerHTML = hash + strParam +"<br><br>"+ json_highlight(oData, 120)
		return

	} catch(e) {
		parent.innerHTML = "" // clear display
		dom.elements = e+""
		return
	}
}

function run(type) {
	if (isMethod < 0 && isMethod > 3) {isMethod = 0}
	strMethod = oMethods[isMethod]
	// clear
	dom.elements.innerHTML = " &nbsp; "
	// pause so users see change
	setTimeout(function() {
		get_elements(type)
	}, 170)
}

let isRevert = false
Promise.all([
	get_globals(),
	build_lists(),
]).then(function(){
	run()
})

</script>
</body>
</html>
